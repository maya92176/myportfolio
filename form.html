<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>アルバイト応募フォーム</h1>
    <p>以下のフォームに必要事項をご記入の上、送信してください。</p>
    
    <form action="#" method="post">
        <fieldset>
            <legend>基本情報</legend>
            <div>
                <label for="name">お名前 *</label>
                <input type="text" id="name" name="user_name" placeholder="例：山田太郎" required>
            </div>

            <div>
                <label for="email">メールアドレス *</label>
                <input type="email" id="email" name="user_email" placeholder="例：yamada@example.com" required>
            </div>
            
            <div>
                <label for="tel">電話番号 *</label>
                <input type="tel" id="tel" name="user_tel" placeholder="例：090-1234-5678" required>
            </div>

            <div>
                <label for="date">生年月日 *</label>
                <input type="date" id="date" name="user_date" required>
            </div>
        </fieldset>

        <fieldset>
            <legend>希望条件</legend>
            <p>希望職種 *</p>
            <div>
                <input type="radio" id="job_hall" name="job_preference" value="hall_staff" required>
                <label for="job_hall">ホールスタッフ</label>

                <input type="radio" id="job_kitchen" name="job_preference" value="kitchen_staff" required>
                <label for="job_kitchen">キッチンスタッフ</label>

                <input type="radio" id="job_other" name="job_preference" value="other" required>
                <label for="job_other">その他</label>
            </div>

            <p>希望勤務曜日(複数選択可)</p>
            <div>
                <input type="checkbox" id="day_mon" name="preferred_days[]" value="monday">
                    <label for="day_mon">月曜日</label>

                <input type="checkbox" id="day_tue" name="preferred_days[]" value="tuesday">
                    <label for="day_tue">火曜日</label>

                <input type="checkbox" id="day_wen" name="preferred_days[]" value="wenesday">
                    <label for="day_wen">水曜日</label>
                <br>
                <input type="checkbox" id="day_thu" name="preferred_days[]" value="thursday">
                    <label for="day_thu">木曜日</label>

                <input type="checkbox" id="day_fry" name="preferred_days[]" value="fryday">
                    <label for="day_fry">金曜日</label>
                
                <input type="checkbox" id="day_sat" name="preferred_days[]" value="saturday">
                    <label for="day_sat">土曜日</label>

                <input type="checkbox" id="day_sun" name="preferred_days[]" value="sunday">
                    <label for="day_sun">日曜日</label>
            </div>

            <div>
                <label for="contact_time">連絡希望時間帯</label>
                <select id="contact_time" name="contact_preference_time">
                    <option value="">選択してください</option>
                    <option value="morning">午前中 (9:00～12:00)</option>
                    <option value="afternoon">午後（12:00～24:00）</option>
                </select>
            </div>
        </fieldset>

        <fieldset>
            <legend>自己PR・志望動機</legend>
            <div>
                <label for="motivation">志望動機など *</label>
                <textarea id="motivation" name="user_motivation" rows="6" placeholder="これまでの経験や、なぜこのアルバイトを希望するのかご記入ください。"required></textarea>
            </div>
        </fieldset>

        <button type="submit">応募内容を送信する</button>
        <button type="reset">入力内容をリセット</button>
    </form>
</body>
</html>
